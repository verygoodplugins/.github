name: Dependabot auto-merge (reusable)

# Reusable workflow — call from any repo with:
#
#   on:
#     pull_request_target:
#       types: [opened, reopened, synchronize, ready_for_review]
#     workflow_run:
#       workflows: ["CI"]
#       types: [completed]
#   jobs:
#     auto-merge:
#       uses: verygoodplugins/.github/.github/workflows/dependabot-auto-merge.yml@main
#       secrets: inherit
#
# Auto-merges Dependabot PRs that are not semver-major updates. Merge-queue
# branches are retried after CI and are enqueued without forcing a merge method.
#
# Major updates always require manual review.

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: false  # falls back to github.token if not provided

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge:
    if: >-
      ${{
        (
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.user.login == 'dependabot[bot]' &&
          !github.event.pull_request.draft
        ) ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Dependabot PR
        id: pr
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GH_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            let pull_number = context.payload.pull_request?.number;

            if (!pull_number) {
              const pullRequests = context.payload.workflow_run?.pull_requests ?? [];
              pull_number = pullRequests[0]?.number;
            }

            if (!pull_number) {
              core.setOutput('skip', 'true');
              core.setOutput('reason', 'No pull request is associated with this event.');
              return;
            }

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            const labels = pull.labels.map((label) => label.name);
            const isDependabot = pull.user?.login === 'dependabot[bot]';
            if (!isDependabot || pull.draft || pull.base.ref !== context.payload.repository.default_branch) {
              core.setOutput('skip', 'true');
              core.setOutput('reason', 'Pull request is not a ready Dependabot PR against the default branch.');
              return;
            }

            core.setOutput('skip', 'false');
            core.setOutput('number', String(pull.number));
            core.setOutput('url', pull.html_url);
            core.setOutput('head_sha', pull.head.sha);
            core.setOutput('has_automerge_label', String(labels.includes('automerge')));
            core.setOutput('has_needs_human_review_label', String(labels.includes('needs-human-review')));

      - name: Fetch Dependabot metadata
        if: ${{ steps.pr.outputs.skip != 'true' && github.event_name == 'pull_request_target' }}
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Label Dependabot PR
        if: ${{ steps.pr.outputs.skip != 'true' && github.event_name == 'pull_request_target' }}
        uses: actions/github-script@v9
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
        with:
          github-token: ${{ secrets.GH_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = Number('${{ steps.pr.outputs.number }}');
            const labels = [
              { name: 'dependencies', color: '0366d6', description: 'Dependency update' },
              process.env.UPDATE_TYPE === 'version-update:semver-major'
                ? { name: 'needs-human-review', color: 'd73a4a', description: 'Requires human review before merge' }
                : { name: 'automerge', color: '0e8a16', description: 'Eligible for automatic merge after required checks pass' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status !== 404) throw error;
                try {
                  await github.rest.issues.createLabel({ owner, repo, ...label });
                } catch (createError) {
                  if (createError.status !== 422) throw createError;
                }
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: labels.map((label) => label.name)
            });

      - name: Auto-approve and merge non-major updates
        if: >-
          ${{
            steps.pr.outputs.skip != 'true' &&
            (
              (
                github.event_name == 'pull_request_target' &&
                steps.meta.outputs.update-type != 'version-update:semver-major'
              ) ||
              (
                github.event_name == 'workflow_run' &&
                steps.pr.outputs.has_automerge_label == 'true' &&
                steps.pr.outputs.has_needs_human_review_label != 'true'
              )
            )
          }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          pr_state="$(
            gh api graphql \
              -f owner="$owner" \
              -f repo="$repo" \
              -F number="$PR_NUMBER" \
              -f query='query($owner:String!,$repo:String!,$number:Int!){repository(owner:$owner,name:$repo){pullRequest(number:$number){isMergeQueueEnabled isInMergeQueue}}}' \
              --jq '.data.repository.pullRequest'
          )"
          queue_enabled="$(jq -r '.isMergeQueueEnabled' <<<"$pr_state")"
          in_queue="$(jq -r '.isInMergeQueue' <<<"$pr_state")"

          if [ "$in_queue" = "true" ]; then
            echo "Pull request is already in the merge queue."
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request_target" ] && [ "$queue_enabled" = "true" ]; then
            echo "Merge queue is enabled; deferring enqueue until CI completes."
            exit 0
          fi

          gh pr review --approve "$PR_URL" 2>/dev/null || true

          if [ "$queue_enabled" = "true" ]; then
            gh pr merge --auto --match-head-commit "$HEAD_SHA" "$PR_URL"
          else
            gh pr merge --auto --squash --match-head-commit "$HEAD_SHA" "$PR_URL"
          fi

      - name: Leave major updates for review
        if: >-
          ${{
            steps.pr.outputs.skip != 'true' &&
            github.event_name == 'pull_request_target' &&
            steps.meta.outputs.update-type == 'version-update:semver-major'
          }}
        env:
          DEPENDENCIES: ${{ steps.meta.outputs.dependency-names }}
        run: |
          {
            echo "### Major dependency update"
            echo
            echo "This Dependabot PR updates: $DEPENDENCIES"
            echo
            echo "Auto-merge was intentionally skipped because this is a semver-major update."
          } >> "$GITHUB_STEP_SUMMARY"
